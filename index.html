<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- reset css -->
    <link rel="stylesheet" href="./assets/CSS/reset.css" />
    <!-- embedded fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Sen:wght@700&display=swap"
      rel="stylesheet"
    />
    <!-- style -->
    <link rel="stylesheet" href="./assets/CSS/style.css" />
    <title>Figma to HTML</title>
  </head>
  <!-- Thêm style(h10000) để có thanh cuộn nhập dữ liệu trên show preview -->
  <body style="height: 10000px">
    <!-- header(là thẻ có ngữ nghĩa) -->
    <!-- header.header.fixed -->
    <!-- Class fixed để sau dùng sticky neo header lại -->
    <header class="header fixed">
      <!-- .main-content: để tái sử dụng lại độ rộng của các phần tử qua các phần  -->
      <div class="main-content">
        <!-- .body để làm thẻ cha bọc các thẻ con lại để lát xoay ngang dùng display: flex -->
        <div class="body">
          <!-- logo -->
          <img src="./assets/img/logo.svg" alt="Lesson." class="logo" />
          <!-- nav -->
          <!-- nav.nav>ul>li*4>a{Home} -->
          <nav class="nav">
            <ul>
              <li class="active">
                <a href="#!">Home</a>
              </li>
              <li>
                <a href="#!">Courses</a>
              </li>
              <li>
                <a href="#!">Pricing</a>
              </li>
              <li>
                <a href="#!">Reviews</a>
              </li>
            </ul>
          </nav>

          <!-- btn action -->
          <!-- .action>a.btn{Sign Up} -->
          <div class="action">
            <a href="#!" class="btn btn-sign-up">Sign Up</a>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
